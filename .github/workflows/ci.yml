name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: ['gateway', 'user-service', 'event-service', 'booking-service', 'payment-service', 'notification-service']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build ${{ matrix.service }}
        run: mvn -B clean verify -f backend/${{ matrix.service }}/pom.xml

  smoke-test:
    runs-on: ubuntu-latest

    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Docker Compose Up
        run: docker compose -f infra/docker-compose.yaml up -d --build

      - name: Wait for services to start
        run: sleep 30

      - name: Health Check Gateway
        run: curl -s http://localhost:8080/actuator/health | grep -q 'UP'

      - name: Health Check User Service
        run: curl -s http://localhost:8081/actuator/health | grep -q 'UP'

      - name: Health Check Event Service
        run: curl -s http://localhost:8082/actuator/health | grep -q 'UP'

      - name: Health Check Booking Service
        run: curl -s http://localhost:8083/actuator/health | grep -q 'UP'

      - name: Health Check Payment Service
        run: curl -s http://localhost:8084/actuator/health | grep -q 'UP'

      - name: Health Check Notification Service
        run: curl -s http://localhost:8085/actuator/health | grep -q 'UP'

      - name: Docker Compose Down
        if: always()
        run: docker compose -f infra/docker-compose.yaml down
